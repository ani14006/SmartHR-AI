<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartHR AI — Attendance Log</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="app-container">
  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">S</div>
      <span class="brand-name">SmartHR AI</span>
    </div>
    <ul class="sidebar-menu">
      <li class="menu-item">
        <a href="/">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
          Dashboard
        </a>
      </li>
      <li class="menu-item">
        <a href="/register">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>
          Register Employee
        </a>
      </li>
      <li class="menu-item">
        <a href="/recognition">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.069A1 1 0 0121 8.87v6.26a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
          Live AI Terminal
        </a>
      </li>
      <li class="menu-item active">
        <a href="/attendance">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/></svg>
          Attendance Log
        </a>
      </li>
      <li class="menu-item">
        <a href="/settings">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          Settings
        </a>
      </li>
    </ul>
  </nav>

  <!-- Main Content -->
  <main class="main-content">
    <div class="content-header">
      <div class="header-title">
        <h1>Attendance Log</h1>
        <p>View and export attendance records</p>
      </div>
      <div style="display:flex; gap:12px;">
        <a href="/api/export/csv" class="btn btn-secondary">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
          Export CSV
        </a>
        <a href="/api/export/excel" class="btn btn-primary">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
          Export Excel
        </a>
      </div>
    </div>

    <div class="glass-card">
      <!-- Filters -->
      <div class="filters-row">
        <div class="filter-item">
          <label class="form-label">Search by Name / ID</label>
          <input type="text" id="filter-search" class="form-control" placeholder="Search..." oninput="loadAttendance()">
        </div>
        <div class="filter-item">
          <label class="form-label">Department</label>
          <select id="filter-dept" class="form-control" onchange="loadAttendance()">
            <option value="">All Departments</option>
            <option value="Engineering">Engineering</option>
            <option value="HR">HR</option>
            <option value="Finance">Finance</option>
            <option value="Sales">Sales</option>
            <option value="Operations">Operations</option>
            <option value="Marketing">Marketing</option>
            <option value="IT">IT</option>
            <option value="Management">Management</option>
          </select>
        </div>
        <div class="filter-item">
          <label class="form-label">Date</label>
          <input type="date" id="filter-date" class="form-control" onchange="loadAttendance()">
        </div>
      </div>

      <!-- Table -->
      <div class="table-responsive">
        <table class="custom-table">
          <thead>
            <tr>
              <th>Employee ID</th>
              <th>Name</th>
              <th>Department</th>
              <th>Date</th>
              <th>Time</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="attendance-body">
            <tr><td colspan="6" style="text-align:center; color:var(--text-secondary);">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div class="toast-container" id="toast-container"></div>
<script src="/static/js/app.js"></script>
<script>
  async function loadAttendance() {
    const search = document.getElementById('filter-search').value;
    const dept = document.getElementById('filter-dept').value;
    const date = document.getElementById('filter-date').value;

    const params = new URLSearchParams();
    if (search) params.set('search', search);
    if (dept) params.set('department', dept);
    if (date) params.set('date', date);

    try {
      const res = await fetch('/api/attendance/list?' + params.toString());
      const rows = await res.json();
      const tbody = document.getElementById('attendance-body');

      if (rows.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:var(--text-secondary);">No records found.</td></tr>';
        return;
      }

      tbody.innerHTML = rows.map(r => `
        <tr>
          <td>${r.employee_id}</td>
          <td>${r.name}</td>
          <td>${r.department || 'N/A'}</td>
          <td>${r.date}</td>
          <td>${r.time}</td>
          <td><span class="badge ${r.status && r.status.toLowerCase() === 'present' ? 'verified' : 'unknown'}">${r.status}</span></td>
        </tr>
      `).join('');
    } catch (err) {
      console.error('Error loading attendance:', err);
    }
  }

  // Set today's date as default
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('filter-date').value = today;

  loadAttendance();
  setInterval(loadAttendance, 15000);
</script>
</body>
</html>
